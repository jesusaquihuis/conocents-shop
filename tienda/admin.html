<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Conocents</title>
<link rel="icon" href="img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body { padding: 40px 24px; max-width: 900px; margin: 0 auto; }
  .admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
  .admin-title { font-family:'Bebas Neue',sans-serif; font-size:2rem; }
  table { width:100%; border-collapse: collapse; margin-bottom: 30px; }
  th, td { text-align:left; padding:10px; border-bottom:1px solid #333; font-size:0.9rem; }
  input, textarea, select { width:100%; padding:8px; margin-bottom:10px; background:#111; color:#fff; border:1px solid #333; border-radius:4px; font-family:inherit; }
  .form-box { background:#151515; padding:20px; border-radius:10px; margin-bottom:30px; }
  button { cursor:pointer; padding:8px 16px; border-radius:6px; border:none; font-weight:600; }
  .btn-primary { background: var(--accent); color:#000; }
  .btn-danger { background:#c0392b; color:#fff; }
  .btn-secondary { background:#333; color:#fff; }
  .row-actions { display:flex; gap:8px; }
</style>
</head>
<body>

<div class="admin-header">
  <div class="admin-title">Panel de <span style="color:var(--accent)">Productos</span></div>
  <a href="/.auth/logout" style="color:#999; font-size:0.85rem;">Cerrar sesión</a>
</div>

<div class="form-box">
  <h3 id="formTitle">Agregar producto</h3>
  <input type="hidden" id="editId">
  <input type="text" id="fName" placeholder="Nombre del producto">
  <input type="number" id="fPrice" placeholder="Precio (ej. 399)">
  <input type="number" id="fOldPrice" placeholder="Precio anterior (opcional)">
  <input type="text" id="fCategory" placeholder="Categoría (ej. Camisetas)">
  <textarea id="fDesc" placeholder="Descripción"></textarea>
  <input type="text" id="fBadge" placeholder="Badge (opcional, ej. NUEVO)">
  <input type="text" id="fImages" placeholder="Rutas de imágenes separadas por coma (ej. img/producto1.png,img/producto2.png)">
  <div class="row-actions">
    <button class="btn-primary" onclick="saveProduct()">Guardar</button>
    <button class="btn-secondary" onclick="resetForm()">Cancelar</button>
  </div>
</div>

<table>
  <thead>
    <tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Categoría</th><th>Acciones</th></tr>
  </thead>
  <tbody id="productsTableBody"></tbody>
</table>

<script src="admin.js"></script>
</body>
</html>
